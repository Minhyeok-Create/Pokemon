<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포켓몬 온라인 프로젝트</title>
    <style>
        body {
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            margin: 0;
            padding: 0;           
        }
        canvas {
            border: 4px solid #fff;
            /* 🎨 고정 배경색을 삭제하여 자바스크립트가 실시간으로 변경하는 맵 색상(연두색/사막색)이 그대로 투영되게 합니다. */
            display: none; 
            border-radius: 8px;
        }
        #game-desc {
            display: none;
            margin: 10px 0 5px 0;
            font-size: 14px;
            color: #aaa;
        }

        /* 🔑 로그인 / 회원가입 스타일 */
        #auth-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(34, 34, 34, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .auth-box {
            background: #333; padding: 30px; border-radius: 12px;
            border: 2px solid #fff; text-align: center; width: 300px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        .auth-box h2 { margin-top: 0; margin-bottom: 20px; color: #ffcb05; }
        .input-group input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #555; border-radius: 6px; box-sizing: border-box;
            background-color: #222; color: white; font-size: 14px;
        }
        .input-group input:focus { border-color: #ffcb05; outline: none; }
        .button-group { display: flex; gap: 10px; }
        .button-group button {
            flex: 1; padding: 12px; border: none; border-radius: 6px;
            cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        .btn-login { background-color: #ffcb05; color: #1d2c5e; }
        .btn-login:hover { background-color: #e5b704; }
        .btn-signup { background-color: #555; color: white; }
        .btn-signup:hover { background-color: #666; }

        /* 💬 채팅 컨테이너 스타일 보정 */
        #chat-container {
            display: none; 
            width: 408px;
            margin-top: 5px;
        }
        #chat-box {
            height: 120px; 
            background: #333; 
            border: 2px solid #fff; 
            overflow-y: auto; 
            padding: 10px; 
            font-size: 13px; 
            text-align: left; 
            border-radius: 6px;
            box-sizing: border-box;
        }
        #chat-input {
            width: 100%; 
            padding: 10px; 
            margin-top: 5px; 
            background: #222; 
            color: white; 
            border: 2px solid #fff; 
            border-radius: 6px; 
            box-sizing: border-box;
        }
        #chat-input:focus {
            border-color: #ffcb05;
            outline: none;
        }
    </style>
</head>
<body>

    <!-- 🔑 로그인 / 회원가입 모달 창 -->
    <div id="auth-container">
        <div class="auth-box">
            <h2>포켓몬 온라인</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="트레이너 아이디 입력" autocomplete="off" />
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="비밀번호 입력" />
            </div>
            <div class="button-group">
                <button onclick="requestLogin()" class="btn-login">로그인</button>
                <button onclick="requestSignup()" class="btn-signup">회원가입</button>
            </div>
        </div>
    </div>

    <!-- 🎮 게임 월드 및 채팅 화면 영역 -->
    <!-- 🧱 [버그 픽스]: 타일 크기 싱크를 맞추기 위해 height를 300에서 400으로 교정했습니다! -->
    <canvas id="myCanvas" width="400" height="400"></canvas>
    <p id="game-desc">방향키: 이동 제어 / Enter: 채팅 입력</p>
    
    <div id="chat-container">
        <div id="chat-box">
            <!-- 채팅 메시지들이 여기에 실시간으로 쌓입니다 -->
        </div>
        <input type="text" id="chat-input" placeholder="메시지를 입력하고 엔터를 누르세요..." autocomplete="off" />
    </div>
    <div id="bag-container" style="display:none; width:408px; margin-top:10px; text-align:center;">
        <button onclick="requestMyBag()" style="width:100%; padding:10px; font-weight:bold; background-color:#ffcb05; border:2px solid #fff; border-radius:6px; cursor:pointer;">🎒 내 포켓몬 가방 확인하기</button>
        <div id="bag-list" style="margin-top:5px; background:#333; border:2px solid #fff; border-radius:6px; padding:10px; font-size:13px; text-align:left; max-height:100px; overflow-y:auto; color:#fff;">
            버튼을 누르면 소지한 포켓몬 목록이 출력됩니다.
        </div>
    </div>
    <!-- ⚔️ 1대1 턴제 배틀 전용 컨테이너 UI (기본 숨김) -->
    <div id="battle-container" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; font-family: sans-serif;">
        <div style="width: 380px; background: #222; border: 4px solid #ffcb05; border-radius: 12px; padding: 20px; box-shadow: 0 0 20px rgba(255, 203, 5, 0.3);">
            
            <h2 style="text-align: center; color: #ffcb05; margin-top: 0; font-size: 20px; border-bottom: 2px solid #555; padding-bottom: 10px;">⚔️ BATTLE MODE ⚔️</h2>
            
            <!-- 🦖 적 야생 포켓몬 정보창 -->
            <div style="background: #333; padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #777;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
                    <span id="enemy-name" style="color: #ff5353;">야생의 구구</span>
                    <span id="enemy-level">Lv.4</span>
                </div>
                <div style="width: 100%; background: #555; height: 12px; border-radius: 6px; margin-top: 5px; overflow: hidden; border: 1px solid #000;">
                    <div id="enemy-hp-bar" style="width: 100%; background: #00ff00; height: 100%; transition: width 0.3s;"></div>
                </div>
                <div style="text-align: right; font-size: 11px; color: #aaa; margin-top: 2px;" id="enemy-hp-text">HP: 15/15</div>
            </div>

            <!-- ⚡ 대치 중 텍스트 연출 로그 -->
            <div id="battle-log" style="height: 60px; background: #000; border-radius: 6px; padding: 8px; font-size: 13px; color: #5ce6e6; overflow-y: auto; margin-bottom: 15px; border: 1px solid #444; line-height: 1.4;">
                앗! 야생 포켓몬과 마주쳤다!
            </div>

            <!-- 🐹 내 출전 포켓몬 정보창 (가방의 1번 피카츄 고정) -->
            <div style="background: #333; padding: 10px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #777;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
                    <span style="color: #ffcb05;">나의 피카츄</span>
                    <span id="my-pokemon-level">Lv.5</span>
                </div>
                <div style="width: 100%; background: #555; height: 12px; border-radius: 6px; margin-top: 5px; overflow: hidden; border: 1px solid #000;">
                    <div id="my-pokemon-hp-bar" style="width: 100%; background: #00ff00; height: 100%; transition: width 0.3s;"></div>
                </div>
                <div style="text-align: right; font-size: 11px; color: #aaa; margin-top: 2px;" id="my-pokemon-hp-text">HP: 20/20</div>
            </div>

            <!-- 🕹️ 전투 커맨드 버튼 그룹 -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="clickAttack()" style="padding: 12px; font-weight: bold; background: #ff5353; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">💥 공격하기</button>
                <button onclick="clickCatch()" style="padding: 12px; font-weight: bold; background: #ffcb05; color: #1d2c5e; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">🔴 던지기</button>
                <button onclick="clickRunaway()" style="grid-column: span 2; padding: 10px; font-weight: bold; background: #555; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;">🏃‍♂️ 도망치기</button>
            </div>

        </div>
    </div>

    <!-- 💡 혹시 모를 브라우저 캐시 방지를 위해 고유 버전을 붙여 배인딩합니다. -->
    <script src="app.js?v=multi_map_ok"></script>
</body>
</html>
