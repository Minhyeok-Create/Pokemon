<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>포켓몬 온라인 프로젝트</title>
    <style>
        body {
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        
        /* 📦 전체 게임 컴포넌트들을 묶어주는 메인 컨테이너 */
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
        }

        canvas {
            border: 4px solid #fff;
            display: none; 
            border-radius: 8px;
            width: 100%; /* 📱 모바일 크기에 맞춰 유연하게 반응 */
            max-width: 400px;
            height: auto;
            box-sizing: border-box;
        }
        
        #game-desc {
            display: none;
            margin: 8px 0;
            font-size: 13px;
            color: #aaa;
            text-align: center;
        }

        /* 🔑 로그인 / 회원가입 스타일 */
        #auth-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(34, 34, 34, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .auth-box {
            background: #333; padding: 30px; border-radius: 12px;
            border: 2px solid #fff; text-align: center; width: 280px;
        }
        .auth-box h2 { margin-top: 0; margin-bottom: 20px; color: #ffcb05; }
        .input-group input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #555; border-radius: 6px; box-sizing: border-box;
            background-color: #222; color: white;
        }
        .button-group { display: flex; gap: 10px; }
        .button-group button {
            flex: 1; padding: 12px; border: none; border-radius: 6px;
            cursor: pointer; font-weight: bold;
        }
        .btn-login { background-color: #ffcb05; color: #1d2c5e; }
        .btn-signup { background-color: #555; color: white; }

        /* 💬 PC 기본 하단 레이아웃 상자 */
        #chat-container, #bag-container {
            width: 100%;
            max-width: 400px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        
        #chat-box {
            height: 100px; 
            background: #333; 
            border: 2px solid #fff; 
            overflow-y: auto; 
            padding: 8px; 
            font-size: 13px; 
            border-radius: 6px;
        }

        /* 📱 모바일/대형축소 화면 전용 흑마법 CSS Grid 작동 공간 */
        @media (max-width: 768px) {
            #game-wrapper {
                max-width: 100%;
            }
            
            /* 🧭 하단 조작 구역을 좌우 반반 스플릿 구조로 변환 */
            .mobile-split-panel {
                display: grid !important;
                grid-template-columns: 140px 1fr; /* 좌측 조이스틱 존 고정, 우측은 가방/채팅 프리존 */
                gap: 10px;
                width: 100%;
                max-width: 400px;
                margin-top: 8px;
                align-items: center;
            }

            #mobile-joystick {
                display: block !important; /* 가상패드 켜기 */
                margin: 0 !important;
            }

            #chat-container, #bag-container {
                max-width: 100%;
                margin-top: 0 =important;
            }
            
            #chat-box {
                height: 70px; /* 세로 압축을 위해 채팅창 높이 소폭 제한 */
                font-size: 11px;
            }
            
            #bag-list {
                max-height: 60px !important;
                font-size: 11px;
            }
            
            #game-desc { display: none !important; } /* 공간 절약을 위해 설명 생략 */
        }
    </style>
</head>
<body>

    <!-- 🔑 로그인 / 회원가입 모달 창 -->
    <div id="auth-container">
        <div class="auth-box">
            <h2>포켓몬 온라인</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="트레이너 아이디 입력" autocomplete="off" />
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="비밀번호 입력" />
            </div>
            <div class="button-group">
                <button onclick="requestLogin()" class="btn-login">로그인</button>
                <button onclick="requestSignup()" class="btn-signup">회원가입</button>
            </div>
        </div>
    </div>

    <!-- 📦 게임 종합 가동 구역 래퍼 생성 -->
    <div id="game-wrapper">
        
        <!-- 🎮 게임 스크린 캔버스 -->
        <canvas id="myCanvas" width="400" height="400"></canvas>
        <p id="game-desc">방향키: 이동 제어 / Enter: 채팅 입력</p>
        
        <!-- 🧭 [그리드 샌드박스]: 모바일 크기 시 이 내부의 컴포넌트들이 좌우로 재배치됩니다. -->
        <div class="mobile-split-panel" style="display: block; width: 100%;">
            
            <!-- 🕹️ 왼쪽 배치 대상: 모바일 전용 십자 패드 (크기를 130px로 축소하여 세로 부하를 완벽 차단) -->
            <div id="mobile-joystick" style="display: none; position: relative; width: 130px; height: 130px; background: #333; border-radius: 50%; border: 3px solid #ffcb05; box-shadow: 0 4px 10px rgba(0,0,0,0.4); box-sizing: border-box;">
                <div style="position: absolute; top: 44px; left: 44px; width: 36px; height: 36px; background: #222; border-radius: 50%; border: 2px solid #555; z-index: 5;"></div>
                <button id="btn-up" style="position: absolute; top: 3px; left: 41px; width: 42px; height: 38px; font-weight: bold; font-size: 15px; background: #555; color: white; border: 1px solid #fff; border-radius: 6px; cursor: pointer; touch-action: manipulation; z-index: 10;">▲</button>
                <button id="btn-left" style="position: absolute; top: 41px; left: 3px; width: 38px; height: 42px; font-weight: bold; font-size: 15px; background: #555; color: white; border: 1px solid #fff; border-radius: 6px; cursor: pointer; touch-action: manipulation; z-index: 10;">◀</button>
                <button id="btn-right" style="position: absolute; top: 41px; right: 3px; width: 38px; height: 42px; font-weight: bold; font-size: 15px; background: #555; color: white; border: 1px solid #fff; border-radius: 6px; cursor: pointer; touch-action: manipulation; z-index: 10;">▶</button>
                <button id="btn-down" style="position: absolute; bottom: 3px; left: 41px; width: 42px; height: 38px; font-weight: bold; font-size: 15px; background: #555; color: white; border: 1px solid #fff; border-radius: 6px; cursor: pointer; touch-action: manipulation; z-index: 10;">▼</button>
            </div>

            <!-- 우측 배치 대상 묶음: 채팅 및 가방 주머니 -->
            <div style="display: flex; flex-direction: column; width: 100%; gap: 5px;">
                <!-- 💬 채팅 컨트롤러 -->
                <div id="chat-container">
                    <div id="chat-box"></div>
                    <div style="display: flex; gap: 4px; margin-top: 4px; width: 100%;">
                        <input type="text" id="chat-input" placeholder="채팅 입력..." autocomplete="off" style="flex: 1; padding: 8px; background: #222; color: white; border: 2px solid #fff; border-radius: 6px; box-sizing: border-box; font-size: 12px;" />
                        <button onclick="clickSendChat()" style="width: 50px; font-weight: bold; font-size: 12px; background-color: #ffcb05; color: #1d2c5e; border: 2px solid #fff; border-radius: 6px; cursor: pointer; touch-action: manipulation;">전송</button>
                    </div>
                </div>

                <!-- 🎒 인벤토리 가방 제어소 -->
                <div id="bag-container" style="display:none; text-align:center;">
                    <button onclick="requestMyBag()" style="width:100%; padding:6px; font-weight:bold; font-size:12px; background-color:#ffcb05; border:2px solid #fff; border-radius:6px; cursor:pointer;">🎒 가방 확인</button>
                    <div id="bag-list" style="margin-top:3px; background:#333; border: 2px solid #fff; border-radius:6px; padding:6px; font-size:12px; text-align:left; max-height:80px; overflow-y:auto; color:#fff;">
                        버튼을 누르면 목록이 출력됩니다.
                    </div>
                </div>
            </div>

        </div> <!-- mobile-split-panel 끝 -->
    </div> <!-- game-wrapper 끝 -->

    <!-- ⚔️ 1대1 턴제 배틀 전용 컨테이너 UI (기본 숨김) -->
    <div id="battle-container" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; font-family: sans-serif; padding: 10px; box-sizing: border-box;">
        <div style="width: 100%; max-width: 360px; background: #222; border: 4px solid #ffcb05; border-radius: 12px; padding: 15px; box-shadow: 0 0 20px rgba(255, 203, 5, 0.3); box-sizing: border-box;">
            <h2 style="text-align: center; color: #ffcb05; margin-top: 0; font-size: 18px; border-bottom: 2px solid #555; padding-bottom: 8px;">⚔️ BATTLE MODE ⚔️</h2>
            <div style="background: #333; padding: 8px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #777;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 13px;">
                    <span id="enemy-name" style="color: #ff5353;">야생의 몬스터</span>
                    <span id="enemy-level">Lv.0</span>
                </div>
                <div style="width: 100%; background: #555; height: 10px; border-radius: 5px; margin-top: 4px; overflow: hidden; border: 1px solid #000;">
                    <div id="enemy-hp-bar" style="width: 100%; background: #00ff00; height: 100%; transition: width 0.3s;"></div>
                </div>
                <div style="text-align: right; font-size: 11px; color: #aaa; margin-top: 2px;" id="enemy-hp-text">HP: 0/0</div>
            </div>
            <div id="battle-log" style="height: 55px; background: #000; border-radius: 6px; padding: 6px; font-size: 12px; color: #5ce6e6; overflow-y: auto; margin-bottom: 10px; border: 1px solid #444; line-height: 1.3; white-space: pre-line;">
                전투 개시!
            </div>
            <div style="background: #333; padding: 8px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #777;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 13px;">
                    <span style="color: #ffcb05;">나의 피카츄</span>
                    <span id="my-pokemon-level">Lv.5</span>
                </div>
                <div style="width: 100%; background: #555; height: 10px; border-radius: 5px; margin-top: 4px; overflow: hidden; border: 1px solid #000;">
                    <div id="my-pokemon-hp-bar" style="width: 100%; background: #00ff00; height: 100%; transition: width 0.3s;"></div>
                </div>
                <div style="text-align: right; font-size: 11px; color: #aaa; margin-top: 2px;" id="my-pokemon-hp-text">HP: 20/20</div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button onclick="clickAttack()" style="padding: 10px; font-weight: bold; background: #ff5353; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;">💥 공격</button>
                <button onclick="clickCatch()" style="padding: 10px; font-weight: bold; background: #ffcb05; color: #1d2c5e; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;">🔴 포획</button>
                <button onclick="clickRunaway()" style="grid-column: span 2; padding: 8px; font-weight: bold; background: #555; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px;">🏃‍♂️ 도망치기</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=multi_map_ok"></script>
</body>
</html>
