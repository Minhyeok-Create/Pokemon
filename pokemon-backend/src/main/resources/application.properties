spring.application.name=pokemon-backend

# 🔥 [필수 수정 1] Render 배포 환경에 맞는 포트 동적 바인딩
# 내 컴퓨터에서는 8080, Render에 올라가면 서버가 지정해준 환경변수 포트를 자동으로 따라갑니다.
server.port=${PORT:8080}

# 🔥 [필수 수정 2] H2 데이터베이스 파일 저장 경로 절대경로화
# 클라우드 서버 특성상 상대경로(./h2db)를 쓰면 에러가 나거나 재부팅 시 데이터가 파괴될 수 있습니다.
# 사용자 홈 디렉토리(/opt/render/project/src 등) 아래에 안전하게 생성되도록 경로를 수정합니다.
spring.datasource.url=jdbc:h2:file:~/h2db/pokemondb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 💡 하이버네이트 H2 방언 명시
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 2. JPA 테이블 자동 생성 및 로그 세팅
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. H2 웹 콘솔 서버 설정 (배포 환경에서도 주소창 뒤에 /h2-console을 붙여 접속 가능합니다)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true